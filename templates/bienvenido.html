<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NEON THREAD — Bienvenido</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  body {
    min-height:100vh;
    background: radial-gradient(ellipse at 50% 30%, #08162a, #020408);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family:'Rajdhani',sans-serif; color:white; overflow:hidden;
  }
  canvas { position:fixed; inset:0; z-index:0; }
  .content { position:relative; z-index:10; text-align:center; animation: fadeUp 1.2s cubic-bezier(.16,1,.3,1) forwards; opacity:0; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

  .welcome-tag { font-size:11px; letter-spacing:6px; text-transform:uppercase; color:rgba(0,245,212,.6); margin-bottom:16px; }
  h1 { font-family:'Bebas Neue',sans-serif; font-size:80px; letter-spacing:6px;
    background:linear-gradient(175deg,#fff,rgba(255,255,255,.4));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; line-height:1; }
  h1 span { color:#00f5d4; -webkit-text-fill-color:#00f5d4; }
  .sub { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:18px; color:rgba(255,255,255,.35); margin:14px 0 40px; letter-spacing:1px; }

  .btn-shop {
    display:inline-block; padding:16px 48px;
    border:1px solid #00f5d4; color:#00f5d4;
    font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:6px;
    text-decoration:none; position:relative; overflow:hidden; transition:color .4s;
  }
  .btn-shop::before { content:''; position:absolute; inset:0; background:#00f5d4; transform:translateX(-100%); transition:transform .4s cubic-bezier(.16,1,.3,1); z-index:0; }
  .btn-shop:hover::before { transform:translateX(0); }
  .btn-shop:hover { color:#04070f; }
  .btn-shop span { position:relative; z-index:1; }

  .logout { display:block; margin-top:20px; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,.2); text-decoration:none; transition:color .3s; }
  .logout:hover { color:#ff2d78; }

  .neon-ring {
    width:160px; height:160px; border-radius:50%; margin:0 auto 30px;
    border:2px solid rgba(0,245,212,.3);
    box-shadow: 0 0 30px rgba(0,245,212,.15), inset 0 0 30px rgba(0,245,212,.05);
    display:flex; align-items:center; justify-content:center;
    animation: ringPulse 3s ease-in-out infinite;
    font-size:64px;
  }
  @keyframes ringPulse { 0%,100%{box-shadow:0 0 20px rgba(0,245,212,.15),inset 0 0 20px rgba(0,245,212,.05)} 50%{box-shadow:0 0 50px rgba(0,245,212,.35),inset 0 0 40px rgba(0,245,212,.1)} }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="content">
  <div class="neon-ring">🧥</div>
  <div class="welcome-tag">// Acceso concedido</div>
  <h1>BIENVENIDO,<br><span>{{ nombre }}</span></h1>
  <p class="sub">Tu colección de invierno te espera.</p>
  <a href="#" class="btn-shop"><span>VER COLECCIÓN →</span></a>
  <a href="/" class="logout">Cerrar sesión</a>
</div>
<script>
  const c=document.getElementById('c'),ctx=c.getContext('2d');
  let W,H; function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;} resize();
  window.addEventListener('resize',resize);
  const pts=Array.from({length:120},()=>({x:Math.random()*3000,y:Math.random()*2000,r:Math.random()*1.5+.3,sp:Math.random()*.2+.05,op:Math.random()*.5+.1,ph:Math.random()*Math.PI*2}));
  function loop(){
    ctx.clearRect(0,0,W,H);
    const bg=ctx.createRadialGradient(W/2,H/3,0,W/2,H/2,W*.8);
    bg.addColorStop(0,'rgba(8,22,42,1)');bg.addColorStop(1,'rgba(2,4,10,1)');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    pts.forEach(p=>{p.ph+=.01;const op=p.op*(.7+.3*Math.sin(p.ph));ctx.beginPath();ctx.arc(p.x%W,p.y%H,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${op})`;ctx.fill();p.y+=p.sp;if(p.y>H){p.y=0;p.x=Math.random()*W;}});
    requestAnimationFrame(loop);
  }
  loop();
</script>
</body>
</html>
