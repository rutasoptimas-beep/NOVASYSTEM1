<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NEON THREAD — Iniciar Sesión</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@200;300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--red:#c0392b;--red-dim:#8b2318;--off-white:#e8e4de;--gray:#9a9590;--dark:#0e0d0c;--dark2:#161412;--border:rgba(255,255,255,0.07);}
html,body{height:100%;background:var(--dark);color:var(--off-white);font-family:'Montserrat',sans-serif;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5;animation:grain .8s steps(2) infinite;}
@keyframes grain{0%,100%{transform:translate(0,0)}25%{transform:translate(-1px,-1px)}75%{transform:translate(1px,1px)}}
.wrapper{display:grid;grid-template-columns:1fr 460px;height:100vh;}
.image-panel{position:relative;overflow:hidden;background:var(--dark2);}
.slide{position:absolute;inset:0;background-size:cover;background-position:center top;filter:brightness(.5) contrast(1.1) saturate(.6);opacity:0;transition:opacity 1.4s ease;animation:zoom 20s ease-in-out infinite alternate;}
.slide.active{opacity:1;}
@keyframes zoom{from{transform:scale(1.05)}to{transform:scale(1.0)}}
.image-panel::after{content:'';position:absolute;inset:0;background:linear-gradient(to right,transparent 55%,var(--dark) 100%),linear-gradient(to top,rgba(10,8,6,.92) 0%,transparent 45%),linear-gradient(to bottom,rgba(10,8,6,.4) 0%,transparent 30%);z-index:1;pointer-events:none;}
.img-content{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;justify-content:space-between;padding:44px 48px;}
.img-top{display:flex;justify-content:space-between;align-items:center;}
.brand{display:flex;align-items:center;gap:14px;}
.brand-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:6px;color:var(--off-white);}
.brand-sep{width:1px;height:20px;background:var(--border);}
.brand-season{font-size:8px;letter-spacing:4px;text-transform:uppercase;color:var(--gray);}
.live-tag{display:flex;align-items:center;gap:7px;font-size:8px;letter-spacing:4px;text-transform:uppercase;color:var(--gray);}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 2s ease infinite;}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(192,57,43,.5)}70%{opacity:.7;box-shadow:0 0 0 5px rgba(192,57,43,0)}}
.img-headline h1{font-family:'Playfair Display',serif;font-size:clamp(44px,5.5vw,72px);font-weight:700;line-height:.93;letter-spacing:-1px;color:var(--off-white);margin-bottom:18px;}
.img-headline h1 em{display:block;font-style:italic;font-weight:400;color:rgba(232,228,222,.55);}
.img-headline p{font-size:10px;font-weight:300;letter-spacing:3px;text-transform:uppercase;color:var(--gray);line-height:1.9;max-width:300px;}
.img-dots{display:flex;gap:6px;align-items:center;margin-top:20px;}
.dot{width:20px;height:1px;background:rgba(255,255,255,.2);cursor:pointer;transition:all .4s;}
.dot.active{width:36px;background:var(--red);}
.corner-tl{position:absolute;top:44px;right:48px;z-index:10;width:40px;height:40px;border-top:1px solid var(--red);border-right:1px solid var(--red);opacity:.6;}
.vert-line{position:absolute;left:0;top:0;bottom:0;z-index:10;width:2px;background:linear-gradient(to bottom,transparent,var(--red-dim),transparent);}
.login-panel{background:var(--dark);border-left:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;padding:64px 56px;position:relative;overflow:hidden;}
.login-panel::before{content:'';position:absolute;top:0;right:0;width:130px;height:1px;background:linear-gradient(to left,var(--red),transparent);}
.login-panel::after{content:'';position:absolute;bottom:0;left:0;width:90px;height:1px;background:linear-gradient(to right,var(--red-dim),transparent);}
.lp-corner-v{position:absolute;top:0;right:0;width:1px;height:80px;background:linear-gradient(to bottom,var(--red),transparent);}
.login-eyebrow{font-size:8px;font-weight:500;letter-spacing:5px;text-transform:uppercase;color:var(--red);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.login-eyebrow::before{content:'';display:block;width:18px;height:1px;background:var(--red);}
.login-title{font-family:'Playfair Display',serif;font-size:40px;font-weight:700;line-height:1.05;color:var(--off-white);margin-bottom:6px;}
.login-title em{font-style:italic;font-weight:400;color:var(--gray);}
.login-sub{font-size:11px;font-weight:300;letter-spacing:1px;color:var(--gray);margin-bottom:10px;}
.red-bar{width:32px;height:1px;background:var(--red);margin:28px 0 36px;}
.field{position:relative;margin-bottom:30px;}
.field label{display:block;font-size:9px;font-weight:500;letter-spacing:4px;text-transform:uppercase;color:var(--gray);margin-bottom:10px;transition:color .3s;}
.field:focus-within label{color:var(--off-white);}
.field input{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,.1);color:var(--off-white);font-family:'Montserrat',sans-serif;font-size:14px;font-weight:300;letter-spacing:1px;padding:10px 0 12px;outline:none;transition:border-color .3s;caret-color:var(--red);}
.field input:focus{border-bottom-color:rgba(255,255,255,.35);}
.field input::placeholder{color:rgba(255,255,255,.12);font-style:italic;font-weight:200;}
.field-bar{position:absolute;bottom:0;left:0;height:1px;width:0;background:var(--red);transition:width .45s cubic-bezier(.16,1,.3,1);}
.field:focus-within .field-bar{width:100%;}
.alert-error{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--red);padding:12px 14px;margin-bottom:16px;border-left:2px solid var(--red);animation:fadeIn .4s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.btn-login{width:100%;padding:16px;background:transparent;border:1px solid rgba(255,255,255,.15);color:var(--off-white);font-family:'Montserrat',sans-serif;font-size:10px;font-weight:500;letter-spacing:5px;text-transform:uppercase;cursor:pointer;position:relative;overflow:hidden;transition:border-color .3s,color .3s;margin-bottom:32px;}
.btn-login::before{content:'';position:absolute;inset:0;background:var(--red);transform:translateX(-102%);transition:transform .5s cubic-bezier(.16,1,.3,1);}
.btn-login:hover{border-color:var(--red);color:white;}
.btn-login:hover::before{transform:translateX(0);}
.btn-login span{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;gap:10px;}
.btn-login span::after{content:'→';transition:transform .3s;}
.btn-login:hover span::after{transform:translateX(4px);}
.login-footer{display:flex;justify-content:space-between;align-items:center;padding-top:28px;border-top:1px solid var(--border);}
.login-footer a{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gray);text-decoration:none;transition:color .3s;}
.login-footer a:hover{color:var(--off-white);}
.login-footer-dot{width:3px;height:3px;border-radius:50%;background:var(--red);}
.anim{opacity:0;transform:translateY(18px);animation:slideUp .7s cubic-bezier(.16,1,.3,1) forwards;}
@keyframes slideUp{to{opacity:1;transform:translateY(0)}}
.a1{animation-delay:.15s}.a2{animation-delay:.25s}.a3{animation-delay:.35s}.a4{animation-delay:.45s}.a5{animation-delay:.55s}.a6{animation-delay:.65s}
@media(max-width:780px){.wrapper{grid-template-columns:1fr;}.image-panel{display:none;}.login-panel{padding:52px 32px;}html,body{overflow:auto;}}
</style>
</head>
<body>
<div class="wrapper">

  <div class="image-panel" id="imagePanel">
    <div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1509631179647-0177331693ae?w=1200&q=85&fit=crop')"></div>
    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1539109136881-3be0616acf4b?w=1200&q=85&fit=crop')"></div>
    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1469334031218-e382a71b716b?w=1200&q=85&fit=crop')"></div>
    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=1200&q=85&fit=crop')"></div>
    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1483985988355-763728e1935b?w=1200&q=85&fit=crop')"></div>
    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1529139574466-a303027c1d8b?w=1200&q=85&fit=crop')"></div>
    <div class="vert-line"></div>
    <div class="corner-tl"></div>
    <div class="img-content">
      <div class="img-top">
        <div class="brand">
          <div class="brand-name">NEON THREAD</div>
          <div class="brand-sep"></div>
          <div class="brand-season">Invierno 2025</div>
        </div>
        <div class="live-tag"><div class="live-dot"></div>Colección Exclusiva</div>
      </div>
      <div>
        <div class="img-headline">
          <h1>DESIGN<br><em>&amp; Freedom</em></h1>
          <p>El frío nunca se vistió<br>tan bien.<br>Tu guardarropa del futuro.</p>
        </div>
        <div class="img-dots" id="dots"></div>
      </div>
    </div>
  </div>

  <div class="login-panel">
    <div class="lp-corner-v"></div>
    <div class="login-eyebrow anim a1">// Acceso Miembros</div>
    <h1 class="login-title anim a2">Iniciar <em>Sesión</em></h1>
    <p class="login-sub anim a2">Bienvenido de vuelta</p>
    <div class="red-bar anim a3"></div>
    {% if error %}<div class="alert-error">{{ error }}</div>{% endif %}
    <form method="POST" action="/">
      <div class="field anim a3">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username" placeholder="tu_usuario" autocomplete="username" required>
        <div class="field-bar"></div>
      </div>
      <div class="field anim a4">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
        <div class="field-bar"></div>
      </div>
      <button type="submit" class="btn-login anim a5"><span>Acceder</span></button>
    </form>
    <div class="login-footer anim a6">
      <a href="/registro">¿No tienes cuenta?</a>
      <div class="login-footer-dot"></div>
      <a href="/registro">Registrarse</a>
    </div>
  </div>

</div>
<script>
const slides=document.querySelectorAll('.slide');
const dotsC=document.getElementById('dots');
let cur=0;
slides.forEach((_,i)=>{const d=document.createElement('div');d.className='dot'+(i===0?' active':'');d.onclick=()=>goTo(i);dotsC.appendChild(d);});
function goTo(n){slides[cur].classList.remove('active');dotsC.children[cur].classList.remove('active');cur=n;slides[cur].classList.add('active');dotsC.children[cur].classList.add('active');}
setInterval(()=>goTo((cur+1)%slides.length),4000);
document.addEventListener('mousemove',e=>{const x=(e.clientX/window.innerWidth-.5)*8,y=(e.clientY/window.innerHeight-.5)*8;const a=document.querySelector('.slide.active');if(a)a.style.transform=`scale(1.04) translate(${x}px,${y}px)`;});
</script>
</body>
</html>
