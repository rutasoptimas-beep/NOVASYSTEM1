<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON THREAD — Mi Cuenta</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Bebas+Neue&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cyan:#00f5d4;--magenta:#ff2d78;--dark:#04070f}
body{min-height:100vh;background:#04080f;font-family:'Rajdhani',sans-serif;color:white;overflow-x:hidden}
#scene{position:fixed;inset:0;z-index:0}
.scanlines{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 4px);z-index:1;pointer-events:none}

/* NAV */
nav{position:relative;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:20px 40px;border-bottom:1px solid rgba(0,245,212,.1);background:rgba(4,8,20,.7);backdrop-filter:blur(20px)}
.nav-brand{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;background:linear-gradient(175deg,#fff,rgba(255,255,255,.45));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-user{display:flex;align-items:center;gap:16px;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.4)}
.nav-user span{color:var(--cyan)}
.btn-logout{padding:8px 20px;border:1px solid rgba(255,45,120,.4);color:rgba(255,45,120,.7);font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;text-decoration:none;transition:all .3s}
.btn-logout:hover{border-color:var(--magenta);color:var(--magenta);box-shadow:0 0 12px rgba(255,45,120,.2)}

/* CONTENT */
.content{position:relative;z-index:10;max-width:900px;margin:0 auto;padding:48px 24px}

/* WELCOME CARD */
.welcome-card{border:1px solid rgba(0,245,212,.15);background:rgba(4,10,22,.85);backdrop-filter:blur(20px);padding:40px 44px;margin-bottom:32px;position:relative;overflow:hidden;animation:fadeUp 1s cubic-bezier(.16,1,.3,1) forwards;opacity:0}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.welcome-card::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(0,245,212,.07),transparent 65%)}
.corner-tl,.corner-br{position:absolute;width:16px;height:16px}
.corner-tl{top:-1px;right:-1px;border-top:2px solid var(--magenta);border-right:2px solid var(--magenta)}
.corner-br{bottom:-1px;left:-1px;border-bottom:2px solid var(--magenta);border-left:2px solid var(--magenta)}
.welcome-tag{font-size:10px;letter-spacing:5px;text-transform:uppercase;color:rgba(0,245,212,.5);margin-bottom:10px}
.welcome-name{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:4px;line-height:1;margin-bottom:6px}
.welcome-name span{color:var(--cyan)}
.welcome-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:rgba(255,255,255,.3)}

/* INFO GRID */
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:32px}
.info-card{border:1px solid rgba(255,255,255,.07);background:rgba(4,10,22,.6);padding:22px 24px;animation:fadeUp 1.1s cubic-bezier(.16,1,.3,1) forwards;opacity:0}
.info-card:nth-child(2){animation-delay:.1s}
.info-card:nth-child(3){animation-delay:.2s}
.info-card:nth-child(4){animation-delay:.3s}
.info-label{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:8px}
.info-value{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:600;color:white;letter-spacing:.5px}
.info-icon{font-size:20px;margin-bottom:10px}

/* CTA */
.cta-row{display:flex;gap:14px;flex-wrap:wrap}
.btn-shop{display:inline-block;padding:14px 36px;border:1px solid var(--cyan);color:var(--cyan);font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:5px;text-decoration:none;position:relative;overflow:hidden;transition:color .4s}
.btn-shop::before{content:'';position:absolute;inset:0;background:var(--cyan);transform:translateX(-100%);transition:transform .4s cubic-bezier(.16,1,.3,1);z-index:0}
.btn-shop:hover::before{transform:translateX(0)}
.btn-shop:hover{color:var(--dark)}
.btn-shop span{position:relative;z-index:1}
.status-badge{display:flex;align-items:center;gap:8px;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(0,245,212,.5);padding:14px 20px;border:1px solid rgba(0,245,212,.12)}
.dot-live{width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.7)}}

@media(max-width:480px){nav{padding:16px 20px}.content{padding:28px 16px}.welcome-card{padding:28px 22px}.welcome-name{font-size:38px}.cta-row{flex-direction:column}}
</style>
</head>
<body>
<canvas id="scene"></canvas>
<div class="scanlines"></div>

<nav>
  <div class="nav-brand">NEON THREAD</div>
  <div class="nav-user">
Hola, <span>{{ usuario.username }}</span>
    <a href="/logout" class="btn-logout">SALIR</a>
  </div>
</nav>

<div class="content">
  <div class="welcome-card">
    <div class="corner-tl"></div>
    <div class="corner-br"></div>
    <div class="welcome-tag">// Acceso concedido</div>
    <div class="welcome-name">BIENVENIDO,<br><span>{{ usuario.nombre }} {{ usuario.apellido }}</span></div>
    <div class="welcome-sub">Tu colección de invierno te espera.</div>
  </div>

  <div class="info-grid">
    <div class="info-card">
      <div class="info-icon">👤</div>
      <div class="info-label">Usuario</div>
      <div class="info-value">@{{ usuario.username }}</div>
    </div>
    <div class="info-card">
      <div class="info-icon">📱</div>
      <div class="info-label">Teléfono</div>
      <div class="info-value">{{ usuario.telefono }}</div>
    </div>
    <div class="info-card">
      <div class="info-icon">🧥</div>
      <div class="info-label">Estado</div>
      <div class="info-value" style="color:var(--cyan)">Miembro Activo</div>
    </div>
    <div class="info-card">
      <div class="info-icon">⭐</div>
      <div class="info-label">Puntos</div>
      <div class="info-value">0 pts</div>
    </div>
  </div>

  <div class="cta-row">
    <a href="#" class="btn-shop"><span>VER COLECCIÓN →</span></a>
    <div class="status-badge"><div class="dot-live"></div>Tienda en línea</div>
  </div>
</div>

<script>
const canvas=document.getElementById('scene'),ctx=canvas.getContext('2d');
let W,H;function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}resize();window.addEventListener('resize',resize);
const pts=Array.from({length:120},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.5+.3,sp:Math.random()*.2+.05,op:Math.random()*.5+.1,ph:Math.random()*Math.PI*2}));
const snow=Array.from({length:80},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.5+.3,sp:.0003+Math.random()*.0004,op:Math.random()*.3+.08}));
function loop(){
  ctx.clearRect(0,0,W,H);
  const bg=ctx.createRadialGradient(W/2,H/3,0,W/2,H/2,W*.8);
  bg.addColorStop(0,'rgba(8,16,34,1)');bg.addColorStop(1,'rgba(2,4,10,1)');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(0,245,212,.018)';ctx.lineWidth=1;
  const gs=60,off=(Date.now()*.003)%gs;
  for(let x=0;x<W+gs;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=-off;y<H+gs;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  pts.forEach(p=>{p.ph+=.01;const op=p.op*(.7+.3*Math.sin(p.ph));ctx.beginPath();ctx.arc(p.x*W,p.y*H,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${op})`;ctx.fill();p.y=(p.y+p.sp/H)%1;});
  snow.forEach(s=>{s.y=(s.y+s.sp)%1;ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(215,238,255,${s.op})`;ctx.fill();});
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
